server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect bare root to the app
    location = / {
        return 301 /cc/;
    }

    # Serve the React SPA at /cc/ — fall back to /cc/index.html for client-side routes.
    # Files live at /usr/share/nginx/html/cc/ to match vite.config.ts base: '/cc/'.
    location /cc/ {
        try_files $uri $uri/ /cc/index.html;
    }

    # Proxy API calls to the OpenClaw gateway on the host.
    # network_mode: host means the container IS the host — use localhost, not host.docker.internal.
    location /api/ {
        proxy_pass http://localhost:18789/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
